spring.application.name=uripet

# =========================================================
# DATABASE
# =========================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/uripet_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:uripet_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Hibernate selecciona PostgreSQLDialect automáticamente.
# No es necesario declarar spring.jpa.properties.hibernate.dialect.

# =========================================================
# JWT
# =========================================================

spring.security.jwt.secret=${JWT_SECRET}
spring.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================================================
# EMAIL
# =========================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =========================================================
# AWS / IMAGE STORAGE
# =========================================================

aws.region=${AWS_REGION}

# =========================================================
# PAYMENT WEBHOOK
# =========================================================

payment.webhook.secret=${PAYMENT_WEBHOOK_SECRET:}

# =========================================================
# CORS
# =========================================================

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# =========================================================
# SWAGGER
# =========================================================

springdoc.swagger-ui.path=/api/docs
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# =========================================================
# SERVER
# =========================================================

server.port=${PORT:8080}

# No exponer mensajes internos de Spring en respuestas HTTP.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false